<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#09090b"/>
  
  <!-- Gradient background -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff1be;stop-opacity:0.1" />
      <stop offset="50%" style="stop-color:#ee87cb;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#b060ff;stop-opacity:0.2" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fff1be" />
      <stop offset="50%" style="stop-color:#ee87cb" />
      <stop offset="100%" style="stop-color:#b060ff" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#grad1)"/>
  
  <!-- Logo mark (moon/crescent shape) -->
  <g transform="translate(550, 180)">
    <circle cx="50" cy="50" r="45" stroke="url(#textGrad)" stroke-width="3" fill="none"/>
    <circle cx="70" cy="40" r="35" fill="#09090b"/>
  </g>
  
  <!-- Lunogram text -->
  <text x="600" y="340" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="600" fill="white" text-anchor="middle">
    Lunogram
  </text>
  
  <!-- Tagline -->
  <text x="600" y="400" font-family="Inter, system-ui, sans-serif" font-size="28" fill="#9ca3af" text-anchor="middle">
    Customer communication for SaaS companies
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="450" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#6b7280" text-anchor="middle">
    Open-source multi-channel marketing automation
  </text>
  
  <!-- Decorative elements - small circles -->
  <circle cx="200" cy="150" r="4" fill="#b060ff" opacity="0.5"/>
  <circle cx="1000" cy="500" r="6" fill="#ee87cb" opacity="0.4"/>
  <circle cx="150" cy="450" r="3" fill="#fff1be" opacity="0.6"/>
  <circle cx="1050" cy="180" r="5" fill="#b060ff" opacity="0.3"/>
  
  <!-- Border -->
  <rect x="1" y="1" width="1198" height="628" stroke="#ffffff" stroke-opacity="0.1" stroke-width="2" fill="none" rx="0"/>
</svg>
