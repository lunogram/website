<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#09090b"/>
  
  <defs>
    <!-- Subtle glow on left -->
    <radialGradient id="glow" cx="30%" cy="50%" r="50%" fx="30%" fy="50%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#09090b;stop-opacity:0" />
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#glow)"/>
  
  <!-- LEFT SIDE: Logo and text -->
  <!-- Logo -->
  <g transform="translate(120, 265)">
    <circle cx="0" cy="0" r="50" stroke="white" stroke-width="3.5" fill="none"/>
    <circle cx="0" cy="0" r="18" fill="white"/>
  </g>
  
  <!-- Product name -->
  <text x="200" y="285" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="600" fill="white">
    Lunogram
  </text>
  
  <!-- Tagline -->
  <text x="200" y="340" font-family="Inter, system-ui, sans-serif" font-size="24" fill="white" fill-opacity="0.6">
    Customer engagement, simplified
  </text>
  
  <!-- RIGHT SIDE: Journey steps flowing top to bottom -->
  <g opacity="0.9">
    <!-- Step 1 - Entrance (top) -->
    <g transform="translate(720, 40)">
      <rect width="180" height="100" rx="14" fill="#18181b" stroke="white" stroke-opacity="0.2"/>
      <line x1="0" y1="40" x2="180" y2="40" stroke="white" stroke-opacity="0.1"/>
      <rect x="14" y="10" width="22" height="22" rx="6" fill="#9ca3af" fill-opacity="0.25"/>
      <circle cx="25" cy="21" r="5" fill="#9ca3af"/>
      <rect x="44" y="16" width="50" height="8" rx="4" fill="white" fill-opacity="0.15"/>
      <rect x="14" y="54" width="90" height="8" rx="4" fill="white" fill-opacity="0.12"/>
      <rect x="14" y="72" width="60" height="8" rx="4" fill="white" fill-opacity="0.08"/>
    </g>
    
    <!-- Connector line 1 -->
    <line x1="810" y1="140" x2="810" y2="175" stroke="white" stroke-opacity="0.3" stroke-width="2"/>
    
    <!-- Step 2 - Gate (decision) -->
    <g transform="translate(720, 175)">
      <rect width="180" height="100" rx="14" fill="#18181b" stroke="#a78bfa" stroke-opacity="0.4"/>
      <line x1="0" y1="40" x2="180" y2="40" stroke="white" stroke-opacity="0.1"/>
      <rect x="14" y="10" width="22" height="22" rx="6" fill="#a78bfa" fill-opacity="0.25"/>
      <circle cx="25" cy="21" r="5" fill="#a78bfa"/>
      <rect x="44" y="16" width="40" height="8" rx="4" fill="white" fill-opacity="0.15"/>
      <rect x="14" y="54" width="100" height="8" rx="4" fill="white" fill-opacity="0.12"/>
      <rect x="14" y="72" width="70" height="8" rx="4" fill="white" fill-opacity="0.08"/>
    </g>
    
    <!-- Connector line 2 -->
    <line x1="810" y1="275" x2="810" y2="310" stroke="white" stroke-opacity="0.3" stroke-width="2"/>
    
    <!-- Step 3 - Delay -->
    <g transform="translate(720, 310)">
      <rect width="180" height="100" rx="14" fill="#18181b" stroke="#fbbf24" stroke-opacity="0.4"/>
      <line x1="0" y1="40" x2="180" y2="40" stroke="white" stroke-opacity="0.1"/>
      <rect x="14" y="10" width="22" height="22" rx="6" fill="#fbbf24" fill-opacity="0.25"/>
      <circle cx="25" cy="21" r="5" fill="#fbbf24"/>
      <rect x="44" y="16" width="45" height="8" rx="4" fill="white" fill-opacity="0.15"/>
      <rect x="14" y="54" width="80" height="8" rx="4" fill="white" fill-opacity="0.12"/>
      <rect x="14" y="72" width="55" height="8" rx="4" fill="white" fill-opacity="0.08"/>
    </g>
    
    <!-- Connector line 3 -->
    <line x1="810" y1="410" x2="810" y2="445" stroke="white" stroke-opacity="0.3" stroke-width="2"/>
    
    <!-- Step 4 - Email -->
    <g transform="translate(720, 445)">
      <rect width="180" height="100" rx="14" fill="#18181b" stroke="#60a5fa" stroke-opacity="0.4"/>
      <line x1="0" y1="40" x2="180" y2="40" stroke="white" stroke-opacity="0.1"/>
      <rect x="14" y="10" width="22" height="22" rx="6" fill="#60a5fa" fill-opacity="0.25"/>
      <circle cx="25" cy="21" r="5" fill="#60a5fa"/>
      <rect x="44" y="16" width="55" height="8" rx="4" fill="white" fill-opacity="0.15"/>
      <rect x="14" y="54" width="95" height="8" rx="4" fill="white" fill-opacity="0.12"/>
      <rect x="14" y="72" width="65" height="8" rx="4" fill="white" fill-opacity="0.08"/>
    </g>
  </g>
  
  <!-- Second column of steps (offset) -->
  <g opacity="0.5">
    <!-- Step A - Push -->
    <g transform="translate(950, 100)">
      <rect width="180" height="100" rx="14" fill="#18181b" stroke="#f472b6" stroke-opacity="0.4"/>
      <line x1="0" y1="40" x2="180" y2="40" stroke="white" stroke-opacity="0.1"/>
      <rect x="14" y="10" width="22" height="22" rx="6" fill="#f472b6" fill-opacity="0.25"/>
      <circle cx="25" cy="21" r="5" fill="#f472b6"/>
      <rect x="44" y="16" width="48" height="8" rx="4" fill="white" fill-opacity="0.15"/>
      <rect x="14" y="54" width="85" height="8" rx="4" fill="white" fill-opacity="0.12"/>
      <rect x="14" y="72" width="58" height="8" rx="4" fill="white" fill-opacity="0.08"/>
    </g>
    
    <!-- Connector -->
    <line x1="1040" y1="200" x2="1040" y2="235" stroke="white" stroke-opacity="0.2" stroke-width="2"/>
    
    <!-- Step B - Email -->
    <g transform="translate(950, 235)">
      <rect width="180" height="100" rx="14" fill="#18181b" stroke="#60a5fa" stroke-opacity="0.4"/>
      <line x1="0" y1="40" x2="180" y2="40" stroke="white" stroke-opacity="0.1"/>
      <rect x="14" y="10" width="22" height="22" rx="6" fill="#60a5fa" fill-opacity="0.25"/>
      <circle cx="25" cy="21" r="5" fill="#60a5fa"/>
      <rect x="44" y="16" width="52" height="8" rx="4" fill="white" fill-opacity="0.15"/>
      <rect x="14" y="54" width="78" height="8" rx="4" fill="white" fill-opacity="0.12"/>
      <rect x="14" y="72" width="50" height="8" rx="4" fill="white" fill-opacity="0.08"/>
    </g>
    
    <!-- Connector -->
    <line x1="1040" y1="335" x2="1040" y2="370" stroke="white" stroke-opacity="0.2" stroke-width="2"/>
    
    <!-- Step C - Gate -->
    <g transform="translate(950, 370)">
      <rect width="180" height="100" rx="14" fill="#18181b" stroke="#a78bfa" stroke-opacity="0.4"/>
      <line x1="0" y1="40" x2="180" y2="40" stroke="white" stroke-opacity="0.1"/>
      <rect x="14" y="10" width="22" height="22" rx="6" fill="#a78bfa" fill-opacity="0.25"/>
      <circle cx="25" cy="21" r="5" fill="#a78bfa"/>
      <rect x="44" y="16" width="42" height="8" rx="4" fill="white" fill-opacity="0.15"/>
      <rect x="14" y="54" width="88" height="8" rx="4" fill="white" fill-opacity="0.12"/>
      <rect x="14" y="72" width="62" height="8" rx="4" fill="white" fill-opacity="0.08"/>
    </g>
  </g>
</svg>
